<!DOCTYPE html>
<html>
<head>
  <title>Delivery Address</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .address-container {
      background: white;
      width: 400px;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      animation: fadeIn 0.8s ease;
    }

    .address-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #e23744;
    }

    .address-container input, 
    .address-container textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .address-container button {
      width: 100%;
      padding: 12px;
      background: #e23744;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .address-container button:hover {
      background: #ff4b5c;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="address-container">
  <h2>Enter Delivery Address 📍</h2>

  <input type="text" placeholder="Full Name" id="name" required>
  <input type="text" placeholder="Phone Number" id="phone" required>
  <textarea placeholder="Full Address" rows="3" id="address" required></textarea>
  <input type="text" placeholder="City" id="city" required>
  <input type="text" placeholder="Pincode" id="pincode" required>

  <button onclick="placeOrder()">Place Order</button>
</div>

<script>
function placeOrder() {

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  let city = document.getElementById("city").value;
  let pincode = document.getElementById("pincode").value;

  if(name === "" || phone === "" || address === "" || city === "" || pincode === "") {
    alert("Please fill all details ❌");
    return;
  }

  alert("🎉 Order Placed Successfully!\n\nThank you " + name);

  localStorage.removeItem("cart");

  window.location.href = "home.html";
}
</script>

</body>
</html>
