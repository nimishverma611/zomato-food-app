<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#667eea,#764ba2);
  font-family:Arial;
}

.login-box{
  background:white;
  padding:40px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input{
  display:block;
  margin-bottom:15px;
  padding:10px;
  width:250px;
}

button{
  width:100%;
  padding:10px;
  background:#764ba2;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="login-box">
<h2>Login 🔐</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script>
function login(){
  localStorage.setItem("loggedIn","true");
  window.location.href="home.html";
}
</script>

</body>
</html>
