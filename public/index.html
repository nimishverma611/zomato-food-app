<!DOCTYPE html>
<html>
<head>
<title>Food Ordering</title>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
  <script>
if(localStorage.getItem("loggedIn") !== "true"){
window.location.href = "login.html";
}
</script>
</head>

<body onload="updateCartCount()">

<header>

<div class="logo">🍔 FoodExpress</div>

<a href="cart.html" class="cart-icon">
🛒
<span id="cart-count" class="cart-count">0</span>
</a>

</header>

<div class="container">

<img class="restaurant-banner"
src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4">

<div class="food-grid">

<div class="food-card">
<img class="food-img"
src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">

<div class="food-info">
<h3>Burger</h3>
<div class="price">₹120</div>
<button onclick="addToCart('Burger',120)">Add</button>
</div>
</div>

<div class="food-card">
<img class="food-img"
src="https://images.unsplash.com/photo-1601924582975-7e5a8d9a6c76">

<div class="food-info">
<h3>Pizza</h3>
<div class="price">₹250</div>
<button onclick="addToCart('Pizza',250)">Add</button>
</div>
</div>

<div class="food-card">
<img class="food-img"
src="https://images.unsplash.com/photo-1555949258-eb67b1ef0ceb">

<div class="food-info">
<h3>Pasta</h3>
<div class="price">₹180</div>
<button onclick="addToCart('Pasta',180)">Add</button>
</div>
</div>

<div class="food-card">
<img class="food-img"
src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">

<div class="food-info">
<h3>Salad</h3>
<div class="price">₹150</div>
<button onclick="addToCart('Salad',150)">Add</button>
</div>
</div>

</div>

<br>

<a href="orders.html" class="home-btn">📦 Order History</a>

</div>

</body>
</html>
