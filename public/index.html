<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zomato Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') no-repeat center center/cover;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg, rgba(226,55,68,0.85), rgba(0,0,0,0.85));
}

.login-container{
  position:relative;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:40px;
  border-radius:20px;
  width:350px;
  text-align:center;
  color:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  animation:fadeIn 1.2s ease;
}

.login-container h1{
  margin-bottom:10px;
  font-weight:600;
}

.login-container p{
  margin-bottom:25px;
  font-size:14px;
  opacity:0.8;
}

.input-group{
  margin-bottom:20px;
  text-align:left;
}

.input-group label{
  font-size:13px;
}

.input-group input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#e23744;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#ff4b5c;
  transform:scale(1.05);
}

.footer{
  margin-top:20px;
  font-size:13px;
}

.footer a{
  color:#fff;
  text-decoration:underline;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="login-container">
  <h1>Zomato 🍽️</h1>
  <p>Login to continue ordering delicious food</p>

  <form onsubmit="login(event)">
    <div class="input-group">
      <label>Email</label>
      <input type="email" required>
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" required>
    </div>

    <button type="submit">Login</button>
  </form>

  <div class="footer">
    Don't have an account? <a href="#">Sign Up</a>
  </div>
</div>

<script>
function login(e){
  e.preventDefault();
  alert("Login Successful 🎉");
  window.location.href="home.html";
}
</script>
</body>
</html>
