<!DOCTYPE html>
<html>
<head>
  <title>Your Cart</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .item { border-bottom: 1px solid #ccc; padding: 10px 0; }
    button { padding: 10px; background: #e23744; color: white; border: none; }
  </style>
</head>
<body>
<h1>Your Cart 🛒</h1>

<div id="cart-items"></div>

<h2 id="total"></h2>

<button id="checkoutBtn" onclick="goToAddress()">Proceed to Checkout</button>

<script>
function goToAddress() {
  window.location.href = "address.html";
}
</script>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let cartItemsDiv = document.getElementById("cart-items");
let total = 0;

cart.forEach(item => {
  let p = document.createElement("p");
  p.innerText = item.name + " - ₹" + item.price;
  cartItemsDiv.appendChild(p);
  total += Number(item.price);
});

document.getElementById("total").innerText = "Total: ₹" + total;

// Hide button if cart empty
if (cart.length === 0) {
  document.getElementById("checkoutBtn").style.display = "none";
}

function checkout() {
  alert("Order placed successfully 🎉");
  localStorage.removeItem("cart");
  window.location.href = "home.html";
}
</script>

</body>
</html>
